# sudo apt install kitty
# mkdir -p ~/.config/kitty
# touch ~/.config/kitty/kitty.conf

input_delay 0
repaint_delay 2
sync_to_monitor no
# wayland_enable_ime no

# ~/.config/kitty/kitty.conf
shell /bin/zsh
editor vim
# include Broadcast.conf

# FONT Y TAMAÑO
font_family FiraMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 22.0

# CURSOR
cursor_shape block
cursor_blink_interval 0

# SCROLLBACK
scrollback_lines 500
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 10
wheel_scroll_multiplier 5.0

# BELL
enable_audio_bell no
visual_bell_duration 0.0

# WINDOW
remember_window_size yes
initial_window_width 1200
initial_window_height 800
window_border_width 1
window_margin_width 0
window_padding_width 4
shell_integration enabled

# TABS - En la parte inferior con números
tab_bar_edge bottom
tab_bar_style powerline
#tab_title_template "{index} {title.split(':',1)[-1]}"
#tab_title_template "{index} {'/'.join(title.split('/')[-2:])}"
tab_title_template "{index} {'/'.join(title.split(':')[-1].split('/')[-2:])}"
tab_bar_min_tabs 1
active_tab_title_template "{title[title.rfind('/')+1:]}"

# LIGADURAS Y TEXTO
disable_ligatures never
copy_on_select yes
strip_trailing_spaces smart

# URLS
detect_urls yes
url_style double
open_url_with default

# ============================================================================
# ATAJOS DE TECLADO
# ============================================================================

# COPIA Y PEGA
map ctrl+shift+c send_text all \x03
map ctrl+c copy_to_clipboard
map ctrl+v paste_from_clipboard

# MULTIPLEXACIÓN - NAVEGACIÓN CON ALT + FLECHAS
map shift+left neighboring_window left
map shift+right neighboring_window right
map shift+up neighboring_window up
map shift+down neighboring_window down

# CREACIÓN DE PANELES
map alt+| launch --location=hsplit --cwd=current
map alt+minus launch --location=vsplit --cwd=current
enabled_layouts *

# CERRAR PANELES
confirm_os_window_close 2
map ctrl+shift+q close_os_window

# REDIMENSIONAR PANELES
map alt+shift+left resize_window narrower
map alt+shift+right resize_window wider
map alt+shift+up resize_window taller
map alt+shift+down resize_window shorter

# GESTIÓN DE PESTAÑAS
map ctrl+t new_tab_with_cwd
map alt+left previous_tab
map alt+right next_tab
map alt+q close_window

# ACCESO RÁPIDO A PESTAÑAS CON ALT + NÚMERO
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map alt+0 goto_tab 10

# MOVIMIENTO EN LÍNEA
map ctrl+a send_text all \x01
map ctrl+e send_text all \x05
map ctrl+w send_text all \x17
map ctrl+u send_text all \x15

# MOVIMIENTO ENTRE PALABRAS
map alt+b send_text all \x1b\x62
map alt+f send_text all \x1b\x66

# TAMAÑO DE FUENTE
map ctrl+plus change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0 change_font_size all 0

# LAYOUT MANAGEMENT
map shift+space next_layout
map f1 copy_to_buffer a
map f2 paste_from_buffer a

# Selección con mouse
mouse_enabled yes
allow_selection yes
mouse_map left click ungrabbed mouse_handle_click selection link prompt
mouse_map left doublepress ungrabbed mouse_handle_click selection word
mouse_map left triplepress ungrabbed mouse_handle_click selection line

# ============================================================================
# CONFIGURACIÓN ADICIONAL
# ============================================================================

hide_window_decorations yes
mouse_hide_wait 3.0
url_color #e4325e
url_style curly
#text_composition_strategy 1.0 1
select_by_word_characters @-./_~?&=%+#
adjust_line_height 0
adjust_column_width 0
adjust_baseline 0
cursor #e42626
cursor_text_color #000000
cursor_blink_interval -1


tab_powerline_style slanted

#cursor_trail 200
#cursor_trail_decay 0.1 0.4
#cursor_trail_start_threshold 2

# https://dev.to/otamm/kitty-terminal-basics-cheatsheet-1f0o
# alt + f11

tab_bar_align center

active_tab_foreground #d3cba8
active_tab_background #b3224e

inactive_tab_foreground #9caa9d
inactive_tab_background #707a7a

#background_blur 25
#background_opacity 0.90
#dim_opacity 0.50
#draw_minimal_borders yes

active_border_color #e75816
inactive_border_color #5bd13e

allow_remote_control no

background            #2b2b2b
color0                #000000
color1                #da4839
color10               #83d082
color11               #ffff7b
color12               #9fcef0
color13               #ffffff
color14               #a0cef0
color15               #ffffff
color2                #509f50
color3                #ffd249
color4                #ffffff
color5                #cfcfff
color6                #6d9cbd
color7                #ffffff
color8                #685159
color9                #ff7b6a
cursor                #ffffff
foreground            #e5e1db
selection_background  #5a637e
selection_foreground  #2b2b2b
