network:
  version: 2
  renderer: networkd

  ethernets:
    eth0:
      dhcp4: false
      dhcp6: false
      match:
        macaddress: 00:0c:29:7d:40:5f
      set-name: eth0
      addresses:
        - 192.168.65.10/24
      routes:
        - to: 0.0.0.0/0
          via: 192.168.65.2
          metric: 100
      nameservers:
        addresses:
          - 1.1.1.1
          - 192.168.65.2

