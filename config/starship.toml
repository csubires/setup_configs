# ============================================
# Starship Configuration
# Save as: ~/.config/starship.toml
# ============================================

# Timeout para comandos (ms)
command_timeout = 500

# Formato del prompt (lean & fast)
#format = """$username\
#$hostname\
#$directory\
#$git_branch\
#$git_status\
#$nodejs\
#$python\
#$rust\
#$golang\
#$docker_context\
#$line_break\
#$character"""
format = '$directory$git_branch$character'

# Formato del prompt derecho (opcional, descomenta si quieres)
# right_format = """$time"""
right_format = """$hostname$username"""


# ============================================
# Character (prompt symbol)
# ============================================
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

# ============================================
# Directory
# ============================================
[directory]
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"
style = "bold cyan"
read_only = " 🔒"
read_only_style = "red"
format = "[$path]($style)[$read_only]($read_only_style)"

# Special directories with custom icons (optional)
[directory.substitutions]

# ============================================
# Git Branch
# ============================================
[git_branch]
symbol = " "
format = "[$symbol$branch]($style)@"
style = "bold purple"
truncation_length = 20
truncation_symbol = "…"

# ============================================
# Git Status
# ============================================
[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# ============================================
# Language Versions (only show in projects)
# ============================================

[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold green"
# Solo mostrar cuando hay archivos relacionados con Node
detect_files = ["package.json"]
detect_folders = ["node_modules"]
# No detectar solo por .node-version
not_capable_style = ""
disabled = true

[python]
symbol = " "
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = "yellow bold"
detect_extensions = ["py"]
detect_files = [".python-version", "Pipfile", "requirements.txt", "pyproject.toml"]

[rust]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold red"
detect_extensions = ["rs"]
detect_files = ["Cargo.toml"]

[golang]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold cyan"
detect_extensions = ["go"]
detect_files = ["go.mod", "go.sum"]

[docker_context]
symbol = " "
format = "[$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

# ============================================
# Optional: Time (descomenta si quieres)
# ============================================
[time]
disabled = true  # Cambia a false para activar
time_format = "%T"
format = "[$time]($style) "
style = "bold white"

# ============================================
# Optional: Username & Hostname
# ============================================
[username]
disabled = false
show_always = false  # Solo muestra en SSH
format = "[$user]($style) in "
style_user = "bold yellow"
style_root = "bold red"

[hostname]
disabled = false
ssh_only = true
format = "[$hostname]($style) in "
style = "bold dimmed green"

# ============================================
# Desactivar módulos que no usas (más rápido)
# ============================================
[aws]
disabled = true

[gcloud]
disabled = true

[kubernetes]
disabled = true

[terraform]
disabled = true

[helm]
disabled = true

[ruby]
disabled = true

[java]
disabled = true

[php]
disabled = true

[lua]
disabled = true

[perl]
disabled = true

[package]
disabled = true
