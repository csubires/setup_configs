services:

  # ─────────────────────────────────────────
  #  NGINX – servidor web
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine          # imagen más liviana (~20 MB)
    container_name: stack_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────
  #  SSH – servidor OpenSSH (Alpine)
  # ─────────────────────────────────────────
  sshd:
    build:
      context: ./ssh
      dockerfile: Dockerfile
    container_name: stack_sshd
    restart: unless-stopped
    ports:
      - "${SSH_PORT:-2222}:22"
    volumes:
      - ./ssh/keys:/etc/ssh/host_keys:ro   # claves de host persistentes
      - ssh_logs:/var/log
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "22"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  nginx_logs:
  ssh_logs:
